# Netlify config: deploy on git push
# Connect this repo in Netlify dashboard; builds run automatically.

[build]
  command   = "npm run build"
  publish   = "dist"
  base      = "/"
  functions = "netlify/functions"

# API: route /api/chat to serverless function (uses Netlify env LLM_API_KEY)
[[redirects]]
  from    = "/api/chat"
  to      = "/.netlify/functions/chat"
  status  = 200
  force   = true

[[redirects]]
  from    = "/api/transcribe"
  to      = "/.netlify/functions/transcribe"
  status  = 200
  force   = true

# SPA: serve index.html for client-side routes
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200

# Optional: set Node version (Netlify default is 18)
[build.environment]
  NODE_VERSION = "20"
